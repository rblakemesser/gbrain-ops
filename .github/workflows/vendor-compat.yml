name: vendor-compat

on:
  push:
    paths:
      - "patches/gbrain/**"
      - "src/gbrain_ops/vendor.py"
      - ".github/workflows/vendor-compat.yml"
  pull_request:
    paths:
      - "patches/gbrain/**"
      - "src/gbrain_ops/vendor.py"
      - ".github/workflows/vendor-compat.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-patch-series:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e .
      - name: Fetch pinned vendor revision
        run: |
          base=$(python -c 'import json; print(json.load(open("patches/gbrain/manifest.json"))["base_commit"])')
          git clone --filter=blob:none https://github.com/garrytan/gbrain.git /tmp/gbrain
          git -C /tmp/gbrain checkout --detach "$base"
      - run: gbrain-ops vendor-promote --vendor /tmp/gbrain --manifest "$GITHUB_WORKSPACE/patches/gbrain/manifest.json" --output /tmp/gbrain-promoted
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"
      - name: Verify promoted vendor
        working-directory: /tmp/gbrain-promoted
        run: |
          bun install --ignore-scripts --frozen-lockfile
          bun run typecheck
          bun test test/pglite-lock.test.ts test/ingestion/service.test.ts test/ingestion/sources/command-archive.test.ts test/serve-http-owner-lifecycle.test.ts
          test -z "$(git status --porcelain)"
