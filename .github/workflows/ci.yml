name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ops:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest -q
      - run: python -m ruff check src/gbrain_ops
      - run: python -m gbrain_ops.privacy_scan .
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  vendor-compat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"
      - run: python -m pip install -e .
      - run: git clone --filter=blob:none https://github.com/garrytan/gbrain.git vendor/gbrain
      - run: gbrain-ops vendor-promote --vendor vendor/gbrain --manifest patches/gbrain/manifest.json --output vendor/release
      - name: Install promoted runtime dependencies without opening a local brain
        working-directory: vendor/release
        run: PATH="$HOME/.bun/bin:/usr/bin:/bin" bun install --frozen-lockfile
      - name: Verify promoted runtime
        working-directory: vendor/release
        run: |
          bun run typecheck
          bun test \
            test/ingestion/service.test.ts \
            test/ingestion/http-owner-vertical-slice.serial.test.ts \
            test/serve-http-owner-lifecycle.test.ts \
            test/serve-http-startup-failure.serial.test.ts
