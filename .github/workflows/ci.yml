name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test-and-privacy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e '.[dev]'
      - run: pytest -q
      - run: python -m gbrain_ops.privacy_scan .
      - name: Reject tracked runtime state
        run: |
          test -z "$(git ls-files | grep -E '(^|/)(data|brain|state|logs|private)/' || true)"
